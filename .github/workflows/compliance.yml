name: JCI Compliance Suite

on:
  pull_request:
    paths:
      - "packages/trpc/src/compliance/**"
      - "packages/database/sql/**"
      - "packages/contracts/src/**"
      - ".github/workflows/compliance.yml"
  push:
    branches: [main]
    paths:
      - "packages/trpc/src/compliance/**"
  schedule:
    # Nightly 02:00 UTC — corre la suite completa incluida la verificación
    # de cadena audit SHA-256 (lenta) que se omite en PRs.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  compliance:
    name: JCI Compliance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: his
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/his
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run -w @his/database generate

      - name: Run JCI compliance suite
        run: npx vitest run packages/trpc/src/compliance --reporter=junit --outputFile=compliance-report.xml
        env:
          # En PRs corre subset rápido; en nightly + main corre suite completa
          COMPLIANCE_FULL: ${{ github.event_name == 'schedule' || github.event_name == 'push' }}

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compliance-report
          path: compliance-report.xml
          retention-days: 30
