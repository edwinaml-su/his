name: E2E (Playwright)

on:
  workflow_dispatch:
  schedule:
    # Nightly 06:00 UTC ≈ 00:00 America/El_Salvador (UTC-6)
    - cron: '0 6 * * *'

# Scope mínimo: solo lectura. No escribe al repo ni comenta en PRs. [infra-P1-3]
permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: postgresql://his:his@localhost:5432/his_e2e?schema=public
      DIRECT_URL: postgresql://his:his@localhost:5432/his_e2e?schema=public
      NEXT_PUBLIC_SUPABASE_URL: https://e2e-dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: e2e-dummy-anon
      SUPABASE_SERVICE_ROLE_KEY: e2e-dummy-service-role
      AUTH_SECRET: e2e-dummy-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Boot test stack (Postgres + Redis efímeros)
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Sync schema to ephemeral DB
        # CLAUDE.md §db: sin carpeta `prisma/migrations`. Usamos `db push` para
        # crear el schema completo de Prisma en la BD efímera del runner.
        run: npx prisma db push --schema=packages/database/prisma/schema.prisma --skip-generate --accept-data-loss

      - name: Seed minimal data
        run: npm run db:seed
        continue-on-error: true

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
