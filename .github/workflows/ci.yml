name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela ejecuciones previas en la misma rama (ahorra minutos)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build-and-test:
    name: Build, Lint, Test, Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Postgres efímero para pruebas que necesiten BD real (Prisma client + tests de integración livianos)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: his
          POSTGRES_PASSWORD: his
          POSTGRES_DB: his_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U his"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://his:his@localhost:5432/his_test?schema=public
      DIRECT_URL: postgresql://his:his@localhost:5432/his_test?schema=public
      # Valores dummy para que el build de Next.js no falle por env vars públicas requeridas
      NEXT_PUBLIC_SUPABASE_URL: https://ci-dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role
      AUTH_SECRET: ci-dummy-secret-not-used-in-prod-ci-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        # turbo necesita `--` para pass-through de flags Vitest. Sin esto,
        # `--coverage` lo intercepta turbo y falla con "unexpected argument".
        run: npx turbo run test -- --coverage
        env:
          CI: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: |
            **/coverage/lcov.info
            **/coverage/coverage-summary.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Build
        run: npm run build

      # axe-core a11y check — placeholder hasta que @QA prepare el harness
      - name: Accessibility check (axe-core)
        continue-on-error: true
        run: |
          if [ -f "apps/web/scripts/a11y-axe.mjs" ]; then
            node apps/web/scripts/a11y-axe.mjs
          else
            echo "::notice::a11y harness aún no implementado por @QA — paso skipped (continue-on-error)"
          fi
