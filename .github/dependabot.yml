version: 2

updates:
  # Dependencias npm — raíz del monorepo (turbo resuelve workspaces)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/El_Salvador"
    open-pull-requests-limit: 5
    reviewers:
      - "edwinaml-su"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    # Bloquea bumps mayores — los manejamos manualmente en sprints dedicados
    # tras audit de breaking changes + migración guiada. Lección 2026-05-30:
    # Dependabot abrió typescript 5→6, vitest 2→4, lighthouse 12→13 simultáneo
    # y rompió CI con conflictos en package-lock.json.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Agrupar patches y minor para no inundar el backlog
    groups:
      dev-tools:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
          - "prettier*"
          - "vitest*"
          - "@vitest*"
          - "playwright*"
          - "@playwright*"
        update-types:
          - "minor"
          - "patch"
      next-ecosystem:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@next*"
        update-types:
          - "patch"

  # GitHub Actions — mantener actions actualizadas con SHA pinning
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/El_Salvador"
    open-pull-requests-limit: 5
    reviewers:
      - "edwinaml-su"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
