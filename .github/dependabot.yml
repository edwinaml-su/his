version: 2

updates:
  # Dependencias npm — raíz del monorepo (turbo resuelve workspaces)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/El_Salvador"
    open-pull-requests-limit: 5
    reviewers:
      - "edwinaml-su"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    # Bloquea bumps mayores — los manejamos manualmente en sprints dedicados
    # tras audit de breaking changes + migración guiada. Lección 2026-05-30:
    # Dependabot abrió typescript 5→6, vitest 2→4, lighthouse 12→13 simultáneo
    # y rompió CI con conflictos en package-lock.json.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Libs en versión 0.x — semver permite breaking changes en minor.
      # Lección: tiptap-markdown 0.8.10→0.9.0 rompió build (PR #415).
      # Cada lib listada aquí requiere migración manual guiada antes de bump minor.
      - dependency-name: "tiptap-markdown"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "@supabase/ssr"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "@zxing/browser"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "next-themes"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "xlsx"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "@tailwindcss/container-queries"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "class-variance-authority"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "@tailwindcss/typography"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "prettier-plugin-tailwindcss"
        update-types: ["version-update:semver-minor"]
      # AI SDK — minors frecuentemente cambian la API pública (3.x pre-estable)
      - dependency-name: "@ai-sdk/*"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "ai"
        update-types: ["version-update:semver-minor"]
      # cmdk — 0→1 rompe API; mantener para tracking por si regresa a 0.x
      - dependency-name: "cmdk"
        update-types: ["version-update:semver-minor"]
    # Agrupar patches y minor para no inundar el backlog
    groups:
      dev-tools:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
          - "prettier*"
          - "vitest*"
          - "@vitest*"
          - "playwright*"
          - "@playwright*"
        update-types:
          - "minor"
          - "patch"
      next-ecosystem:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@next*"
        update-types:
          - "patch"

  # GitHub Actions — mantener actions actualizadas con SHA pinning
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/El_Salvador"
    open-pull-requests-limit: 5
    reviewers:
      - "edwinaml-su"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
