################################################################################
# secret-template.yaml — Plantilla de secrets con valores PLACEHOLDER
#
# NUNCA commitear este archivo con valores reales.
# Para producción usar:
#   - AWS Secrets Manager + External Secrets Operator (recomendado), o
#   - Sealed Secrets (kubeseal) para commitear secrets cifrados en git, o
#   - kubectl create secret generic his-web-secrets --from-env-file=.env.prod
#
# External Secrets ejemplo (si ESO está instalado):
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret ...
################################################################################
apiVersion: v1
kind: Secret
metadata:
  name: his-web-secrets
  namespace: his-avante
  annotations:
    # Indicador: este archivo es plantilla — reemplazar valores antes de apply
    his.avante.com/is-template: "true"
type: Opaque
stringData:
  # Base de datos
  DATABASE_URL: "postgresql://PLACEHOLDER:PLACEHOLDER@PLACEHOLDER:6543/postgres?pgbouncer=true"
  DIRECT_URL: "postgresql://PLACEHOLDER:PLACEHOLDER@PLACEHOLDER:5432/postgres"

  # Supabase
  NEXT_PUBLIC_SUPABASE_URL: "https://PLACEHOLDER.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "PLACEHOLDER"
  SUPABASE_SERVICE_ROLE_KEY: "PLACEHOLDER"
  SUPABASE_JWT_SECRET: "PLACEHOLDER"

  # Auth
  AUTH_SECRET: "PLACEHOLDER-min-32-chars-random"
  NEXTAUTH_URL: "https://sv.avante-his.com"

  # Audit chain — INMUTABLE tras primer deploy
  AUDIT_HASH_SECRET: "PLACEHOLDER-min-32-chars-random"

  # Sentry
  SENTRY_DSN: "https://PLACEHOLDER@PLACEHOLDER.ingest.sentry.io/PLACEHOLDER"
  NEXT_PUBLIC_SENTRY_DSN: "https://PLACEHOLDER@PLACEHOLDER.ingest.sentry.io/PLACEHOLDER"
