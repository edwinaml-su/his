apiVersion: v1
kind: Service
metadata:
  name: his-web
  namespace: his-avante
  labels:
    app.kubernetes.io/name: his-web
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: his-web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
