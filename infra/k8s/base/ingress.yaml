################################################################################
# ingress.yaml — nginx-ingress + cert-manager (TLS automático via Let's Encrypt)
# Pre-requisitos:
#   - ingress-nginx instalado: https://kubernetes.github.io/ingress-nginx
#   - cert-manager instalado: https://cert-manager.io/docs/installation
#   - ClusterIssuer "letsencrypt-prod" configurado (ver comentario al final)
################################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: his-web
  namespace: his-avante
  labels:
    app.kubernetes.io/name: his-web
    app.kubernetes.io/component: ingress
  annotations:
    # nginx-ingress
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # Headers de seguridad (espejo de vercel.json)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # cert-manager — TLS automático
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sv.avante-his.com
      secretName: his-web-tls
  rules:
    - host: sv.avante-his.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: his-web
                port:
                  name: http

---
