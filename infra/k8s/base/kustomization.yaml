apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: his-avante

resources:
  - namespace.yaml
  - configmap.yaml
  - secret-template.yaml
  - deployment-web.yaml
  - service-web.yaml
  - ingress.yaml
  - hpa.yaml

# Labels comunes aplicados a todos los recursos
commonLabels:
  app.kubernetes.io/part-of: his-avante
  app.kubernetes.io/managed-by: kustomize
